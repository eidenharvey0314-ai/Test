<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Backrooms</title>

<style>
body {
    margin: 0;
    overflow: hidden;
    background: black;
}

#menu {
    position: fixed;
    inset: 0;
    background: black;
    color: white;

    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;

    font-family: Arial, sans-serif;
    z-index: 100;
}

button {
    padding: 15px 30px;
    font-size: 20px;
    cursor: pointer;
}
</style>
</head>

<body>

<div id="menu">
    <h1>THE BACKROOMS</h1>
    <button id="play">ENTER</button>
</div>

<script type="module">

import * as THREE from 'https://unpkg.com/three@0.160.0/build/three.module.js';

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x8f8f55);
scene.fog = new THREE.Fog(0x8f8f55, 10, 250);

const camera = new THREE.PerspectiveCamera(
    75,
    window.innerWidth / window.innerHeight,
    0.1,
    1000
);

camera.position.set(0, 2, 0);

const renderer = new THREE.WebGLRenderer({
    antialias: true
});

renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

const ambient = new THREE.AmbientLight(0xffffff, 1.5);
scene.add(ambient);

const light = new THREE.PointLight(0xffffff, 20, 50);
light.position.set(0, 4, 0);
scene.add(light);

const keys = {};

document.addEventListener("keydown", e => {
    keys[e.code] = true;
});

document.addEventListener("keyup", e => {
    keys[e.code] = false;
});

let yaw = 0;
let pitch = 0;

document.addEventListener("mousemove", e => {

    if(document.pointerLockElement !== document.body)
        return;

    yaw -= e.movementX * 0.002;
    pitch -= e.movementY * 0.002;

    pitch = Math.max(
        -Math.PI/2,
        Math.min(Math.PI/2, pitch)
    );
});

document.getElementById("play").onclick = () => {
    document.body.requestPointerLock();
    document.getElementById("menu").style.display = "none";
};

const ROOM_SIZE = 20;
const generated = new Map();

function createChunk(cx, cz) {

    const key = `${cx},${cz}`;

    if(generated.has(key))
        return;

    generated.set(key, true);

    const floor = new THREE.Mesh(
        new THREE.PlaneGeometry(ROOM_SIZE, ROOM_SIZE),
        new THREE.MeshLambertMaterial({
            color: 0x999955
        })
    );

    floor.rotation.x = -Math.PI/2;
    floor.position.set(
        cx * ROOM_SIZE,
        0,
        cz * ROOM_SIZE
    );

    scene.add(floor);

    const ceiling = floor.clone();
    ceiling.position.y = 5;
    ceiling.rotation.x = Math.PI/2;
    scene.add(ceiling);

    const wallMaterial =
        new THREE.MeshLambertMaterial({
            color: 0xd8d08a
        });

    const walls = [
        [0,-10,0],
        [0,10,Math.PI],
        [-10,0,Math.PI/2],
        [10,0,-Math.PI/2]
    ];

    walls.forEach(w => {

        if(Math.random() < 0.3)
            return;

        const wall = new THREE.Mesh(
            new THREE.PlaneGeometry(20,5),
            wallMaterial
        );

        wall.position.set(
            cx * ROOM_SIZE + w[0],
            2.5,
            cz * ROOM_SIZE + w[1]
        );

        wall.rotation.y = w[2];

        scene.add(wall);
    });

    const lamp = new THREE.PointLight(
        0xffffee,
        5,
        30
    );

    lamp.position.set(
        cx * ROOM_SIZE,
        4,
        cz * ROOM_SIZE
    );

    scene.add(lamp);
}

function generateAroundPlayer() {

    const cx =
        Math.floor(camera.position.x / ROOM_SIZE);

    const cz =
        Math.floor(camera.position.z / ROOM_SIZE);

    for(let x=-5;x<=5;x++) {
        for(let z=-5;z<=5;z++) {
            createChunk(cx+x, cz+z);
        }
    }
}

let bobTime = 0;

function animate() {

    requestAnimationFrame(animate);

    generateAroundPlayer();

    camera.rotation.order = "YXZ";
    camera.rotation.y = yaw;
    camera.rotation.x = pitch;

    const speed = 0.12;

    const forward =
        new THREE.Vector3(
            Math.sin(yaw),
            0,
            Math.cos(yaw)
        );

    const right =
        new THREE.Vector3(
            Math.cos(yaw),
            0,
            -Math.sin(yaw)
        );

    let moving = false;

    if(keys["KeyW"]) {
        camera.position.add(
            forward.clone().multiplyScalar(speed)
        );
        moving = true;
    }

    if(keys["KeyS"]) {
        camera.position.add(
            forward.clone().multiplyScalar(-speed)
        );
        moving = true;
    }

    if(keys["KeyA"]) {
        camera.position.add(
            right.clone().multiplyScalar(-speed)
        );
        moving = true;
    }

    if(keys["KeyD"]) {
        camera.position.add(
            right.clone().multiplyScalar(speed)
        );
        moving = true;
    }

    if(moving) {
        bobTime += 0.12;

        camera.position.y =
            2 +
            Math.sin(bobTime) * 0.05;
    } else {
        camera.position.y = 2;
    }

    renderer.render(scene, camera);
}

animate();

window.addEventListener("resize", () => {

    camera.aspect =
        window.innerWidth /
        window.innerHeight;

    camera.updateProjectionMatrix();

    renderer.setSize(
        window.innerWidth,
        window.innerHeight
    );
});

</script>

</body>
</html>
